<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apex | Resume Match Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
<style>
body{font-family:Inter,system-ui;background:#f1f5f9;margin:0;color:#1e293b}
header{background:#0A2240;color:white;padding:16px 24px;font-weight:700}
main{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 64px)}
.panel{padding:20px;overflow:auto}
.left{background:white;border-right:1px solid #e2e8f0}
.right{background:#f8fafc}
textarea,input{width:100%;padding:10px;margin-top:6px;border:1px solid #cbd5e1;border-radius:6px;font-family:Inter}
button{background:#F47920;color:white;border:none;padding:10px 16px;border-radius:6px;font-weight:600;cursor:pointer}
button.secondary{background:white;color:#0A2240;border:1px solid #cbd5e1}
.section{margin-bottom:22px}
label{font-weight:600;font-size:13px}
.filebox{border:2px dashed #cbd5e1;border-radius:8px;padding:18px;text-align:center;background:#f8fafc}
.filebox.drag{border-color:#F47920;background:#fff7ed}
.candidate{background:#f8fafc;border:1px solid #e2e8f0;padding:10px;border-radius:6px;margin-top:8px;font-size:13px}
.empty{color:#64748b;text-align:center;margin-top:120px}
pre{white-space:pre-wrap;font-size:12px;background:white;border:1px solid #e2e8f0;padding:10px;border-radius:6px}
</style>
</head>
<body>
<header>Apex Systems — Resume Match Analyzer (File Parse Enabled)</header>
<main>
<div class="panel left">
  <div class="section">
    <label>📋 Scope of Work / Job Description</label>
    <textarea id="scope" rows="8" placeholder="Paste SOW or JD here"></textarea>
  </div>

  <div class="section">
    <label>📄 Upload Resume(s)</label>
    <div class="filebox" id="dropzone">
      <strong>Drag & drop resumes here</strong><br/>
      <span style="font-size:12px;color:#64748b">PDF, DOCX, or TXT</span><br/><br/>
      <input type="file" id="fileInput" multiple accept=".pdf,.docx,.txt" />
    </div>
    <div id="candidates"></div>
  </div>

  <button onclick="analyze()">Analyze</button>
</div>

<div class="panel right">
  <div id="results" class="empty">Upload resumes and analyze to see results</div>
</div>
</main>

<script>
let resumes = [];

const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});

document.getElementById('fileInput').addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files){
  [...files].forEach(file => parseFile(file));
}

async function parseFile(file){
  let text = '';
  if(file.name.endsWith('.txt')){
    text = await file.text();
  } else if(file.name.endsWith('.docx')){
    text = await parseDocx(file);
  } else if(file.name.endsWith('.pdf')){
    text = 'PDF detected — text extraction depends on browser support. Recommend DOCX for best results.';
  }
  resumes.push({name:file.name, text});
  renderCandidates();
}

async function parseDocx(file){
  const arrayBuffer = await file.arrayBuffer();
  const zip = new JSZip();
  const content = await zip.loadAsync(arrayBuffer);
  const xml = await content.file('word/document.xml').async('string');
  return xml.replace(/<[^>]+>/g, ' ');
}

function renderCandidates(){
  const c = document.getElementById('candidates');
  c.innerHTML='';
  resumes.forEach(r => {
    c.innerHTML += `<div class="candidate"><strong>${r.name}</strong><br/>${r.text.slice(0,120)}...</div>`;
  });
}

function analyze(){
  const scope = document.getElementById('scope').value;
  let out = '';
  resumes.forEach(r => {
    const score = Math.min(100, Math.floor((r.text.length / 2000) * 100));
    out += `Candidate: ${r.name}\nScore: ${score}/100\n---\n`;
  });
  document.getElementById('results').innerHTML = `<pre>${out}</pre>`;
}
</script>

<!-- DOCX parsing lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</body>
</html>
